<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Login / Register</title>
    <style>
      :root {
        --bg: #0b1020;
        --card: #121a33;
        --text: #e8ecff;
        --muted: #aab3da;
        --border: rgba(255, 255, 255, 0.12);
        --btn: #4b6bff;
        --btn2: #2b3566;
        --danger: #ff5c7a;
        --ok: #33d17a;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
        background: radial-gradient(1200px 700px at 20% 20%, #16204a 0%, var(--bg) 60%);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: 100%;
        max-width: 420px;
        background: rgba(18, 26, 51, 0.85);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px;
        backdrop-filter: blur(8px);
        box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      }

      h1 {
        margin: 0 0 6px;
        font-size: 20px;
        font-weight: 700;
      }
      p.sub {
        margin: 0 0 14px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
      }

      .tabs {
        display: flex;
        gap: 8px;
        margin: 14px 0 16px;
      }
      .tab {
        flex: 1;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text);
        padding: 10px 12px;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 600;
      }
      .tab.active {
        background: rgba(75, 107, 255, 0.18);
        border-color: rgba(75, 107, 255, 0.55);
      }

      form {
        display: grid;
        gap: 10px;
      }
      label {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 4px;
      }
      .field {
        display: grid;
        gap: 6px;
      }
      input {
        width: 100%;
        padding: 11px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.20);
        color: var(--text);
        outline: none;
      }
      input:focus {
        border-color: rgba(75, 107, 255, 0.75);
        box-shadow: 0 0 0 4px rgba(75, 107, 255, 0.15);
      }

      .row {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .btn {
        width: 100%;
        padding: 11px 12px;
        border-radius: 12px;
        border: 1px solid rgba(75, 107, 255, 0.65);
        background: var(--btn);
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
      .btn.secondary {
        border-color: var(--border);
        background: rgba(43, 53, 102, 0.5);
      }
      .btn:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }

      .msg {
        margin-top: 10px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.18);
        color: var(--muted);
        font-size: 13px;
        line-height: 1.35;
        display: none;
      }
      .msg.show { display: block; }
      .msg.error {
        border-color: rgba(255, 92, 122, 0.5);
        color: #ffd1da;
        background: rgba(255, 92, 122, 0.12);
      }
      .msg.ok {
        border-color: rgba(51, 209, 122, 0.45);
        color: #d8ffe9;
        background: rgba(51, 209, 122, 0.10);
      }

      /* "Welcome page" */
      .welcome {
        text-align: center;
        display: none;
        padding: 16px 8px 6px;
      }
      .welcome h2 {
        margin: 0 0 8px;
        font-size: 22px;
      }
      .welcome p {
        margin: 0 0 16px;
        color: var(--muted);
      }

      .tiny {
        margin-top: 10px;
        font-size: 12px;
        color: var(--muted);
        opacity: 0.9;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        color: #dfe6ff;
      }
    </style>
  </head>
  <body>
    <div class="card" id="authCard">
      <h1>Simple Auth</h1>
      <p class="sub">
        Sends JSON via POST to:
        <br />
        <code>http://localhost:3000/user/login</code> and <code>http://localhost:3000/user/create</code>
      </p>

      <div class="tabs">
        <button class="tab active" id="tabLogin" type="button">Login</button>
        <button class="tab" id="tabRegister" type="button">Register</button>
      </div>

      <!-- LOGIN FORM -->
      <form id="loginForm">
        <div class="field">
          <label for="loginUsername">Username</label>
          <input id="loginUsername" autocomplete="username" required />
        </div>

        <div class="field">
          <label for="loginPassword">Password</label>
          <input id="loginPassword" type="password" autocomplete="current-password" required />
        </div>

        <button class="btn" id="loginBtn" type="submit">Login</button>
      </form>

      <!-- REGISTER FORM -->
      <form id="registerForm" style="display:none;">
        <div class="field">
          <label for="regUsername">Username</label>
          <input id="regUsername" autocomplete="username" required />
        </div>

        <div class="field">
          <label for="regEmail">Email</label>
          <input id="regEmail" type="email" autocomplete="email" required />
        </div>

        <div class="field">
          <label for="regPassword">Password</label>
          <input id="regPassword" type="password" autocomplete="new-password" required />
        </div>

        <button class="btn" id="registerBtn" type="submit">Create account</button>
      </form>

      <div class="msg" id="messageBox"></div>

      <div class="tiny">
        If you get a CORS error, your backend must allow requests from this page (or serve this HTML from the same origin).
      </div>
    </div>

    <!-- WELCOME PAGE -->
    <div class="card welcome" id="welcomeCard">
      <h2 id="welcomeTitle">Hi</h2>
      <p id="welcomeSubtitle">You are logged in.</p>
      <div class="row">
        <button class="btn secondary" id="logoutBtn" type="button">Log out</button>
      </div>
    </div>

    <script>
      const API_BASE = "http://localhost:3000";

      // Tabs + forms
      const tabLogin = document.getElementById("tabLogin");
      const tabRegister = document.getElementById("tabRegister");
      const loginForm = document.getElementById("loginForm");
      const registerForm = document.getElementById("registerForm");

      // UI areas
      const msg = document.getElementById("messageBox");
      const authCard = document.getElementById("authCard");
      const welcomeCard = document.getElementById("welcomeCard");
      const welcomeTitle = document.getElementById("welcomeTitle");
      const welcomeSubtitle = document.getElementById("welcomeSubtitle");
      const logoutBtn = document.getElementById("logoutBtn");

      // Buttons
      const loginBtn = document.getElementById("loginBtn");
      const registerBtn = document.getElementById("registerBtn");

      function setTab(which) {
        clearMessage();
        if (which === "login") {
          tabLogin.classList.add("active");
          tabRegister.classList.remove("active");
          loginForm.style.display = "";
          registerForm.style.display = "none";
        } else {
          tabRegister.classList.add("active");
          tabLogin.classList.remove("active");
          registerForm.style.display = "";
          loginForm.style.display = "none";
        }
      }

      tabLogin.addEventListener("click", () => setTab("login"));
      tabRegister.addEventListener("click", () => setTab("register"));

      function showMessage(text, type = "") {
        msg.textContent = text;
        msg.className = "msg show" + (type ? " " + type : "");
      }
      function clearMessage() {
        msg.textContent = "";
        msg.className = "msg";
      }

      function setLoading(btn, isLoading) {
        btn.disabled = isLoading;
        btn.textContent = isLoading ? "Please wait..." : btn.dataset.label;
      }

      async function postJSON(url, data) {
        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });

        // Try to parse JSON even if status code isn't 200
        let json = null;
        const text = await res.text();
        try { json = text ? JSON.parse(text) : null; } catch { /* ignore */ }

        return { ok: res.ok, status: res.status, json, raw: text };
      }

      function showWelcome(kind, username) {
        authCard.style.display = "none";
        welcomeCard.style.display = "block";

        if (kind === "login") {
          welcomeTitle.textContent = `Hi ${username}`;
          welcomeSubtitle.textContent = "You are logged in.";
        } else {
          welcomeTitle.textContent = `${username}, your account created`;
          welcomeSubtitle.textContent = "You can now use your account.";
        }
      }

      function showAuth() {
        welcomeCard.style.display = "none";
        authCard.style.display = "block";
        clearMessage();
      }

      logoutBtn.addEventListener("click", () => {
        showAuth();
        // optional: clear fields
        loginForm.reset();
        registerForm.reset();
        setTab("login");
      });

      // Labels for loading state
      loginBtn.dataset.label = loginBtn.textContent;
      registerBtn.dataset.label = registerBtn.textContent;

      // LOGIN submit
      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        clearMessage();

        const username = document.getElementById("loginUsername").value.trim();
        const password = document.getElementById("loginPassword").value;

        if (!username || !password) {
          showMessage("Please fill username and password.", "error");
          return;
        }

        setLoading(loginBtn, true);
        try {
          const { ok, status, json, raw } = await postJSON(`${API_BASE}/user/login`, {
            username,
            password,
          });

          // Expected: { status: true/false }
          if (json && typeof json.status === "boolean") {
            if (json.status) {
              showWelcome("login", username);
            } else {
              showMessage("Login failed (status=false).", "error");
            }
          } else {
            // Backend did not return expected JSON
            showMessage(
              `Unexpected response (HTTP ${status}).\n` +
              `Expected JSON like {"status": true}.\n` +
              `Got: ${raw || "(empty)"}`,
              "error"
            );
          }
        } catch (err) {
          showMessage(`Network error: ${err.message}`, "error");
        } finally {
          setLoading(loginBtn, false);
        }
      });

      // REGISTER submit
      registerForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        clearMessage();

        const username = document.getElementById("regUsername").value.trim();
        const email = document.getElementById("regEmail").value.trim();
        const password = document.getElementById("regPassword").value;

        if (!username || !email || !password) {
          showMessage("Please fill username, email, and password.", "error");
          return;
        }

        setLoading(registerBtn, true);
        try {
          const { ok, status, json, raw } = await postJSON(`${API_BASE}/user/create`, {
            username,
            password,
            email,
          });

          if (json && typeof json.status === "boolean") {
            if (json.status) {
              showWelcome("register", username);
            } else {
              showMessage("Register failed (status=false).", "error");
            }
          } else {
            showMessage(
              `Unexpected response (HTTP ${status}).\n` +
              `Expected JSON like {"status": true}.\n` +
              `Got: ${raw || "(empty)"}`,
              "error"
            );
          }
        } catch (err) {
          showMessage(`Network error: ${err.message}`, "error");
        } finally {
          setLoading(registerBtn, false);
        }
      });
    </script>
  </body>
</html>
